# GitHub's Python CI guidance:
# https://docs.github.com/en/actions/tutorials/build-and-test-code/python
# GitHub's immutable action pinning guidance:
# https://docs.github.com/en/actions/reference/security/secure-use
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUTF8: "1"

jobs:
  quality:
    name: quality (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Show Python version
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check installed dependencies
        run: python -m pip check

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy scripts

      - name: Check generated configuration and schema
        run: python scripts/generate_config_docs.py --check

      - name: Verify release metadata
        run: python scripts/verify_release_metadata.py

      - name: Verify documented commands
        run: python scripts/verify_docs_commands.py

      - name: Prepare report directory
        run: python -c "from pathlib import Path; Path('reports').mkdir(exist_ok=True)"

      - name: Run tests with coverage
        run: python -m pytest --cov=scripts --cov-report=term-missing --cov-report=xml:reports/coverage.xml --cov-report=json:reports/coverage.json --junitxml=reports/junit.xml -q

      - name: Run offline self-test
        run: python scripts/self_test.py

      - name: Upload test and coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-reports-${{ runner.os }}-py${{ matrix.python-version }}
          path: reports/
          if-no-files-found: warn
          retention-days: 14
